# ClusterSecretStore → Vault. ESO reads external-origin secrets from here. Dev uses token auth;
# the cloud overlay (empty tokenSecret.name) is expected to switch to the kubernetes auth method.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      path: {{ .Values.vault.path | quote }}
      version: {{ .Values.vault.version }}
      auth:
        tokenSecretRef:
          name: {{ .Values.vault.tokenSecret.name }}
          namespace: {{ .Values.vault.tokenSecret.namespace }}
          key: {{ .Values.vault.tokenSecret.key }}
