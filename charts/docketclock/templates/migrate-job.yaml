{{- if .Values.migrations.enabled }}
# DocketClock schema migrations — a CNPG-aware Job run as an Argo CD PreSync hook, so the append-only
# observation log + its triggers are provisioned reproducibly BEFORE the app rolls out (never by hand).
# Gated on .Values.migrations.enabled (default false) until apps/docketclock ships a real image — see
# values.yaml. The Job runs the same image as the app and reads the CNPG-managed app DATABASE_URL.
apiVersion: batch/v1
kind: Job
metadata:
  name: docketclock-migrate
  labels:
    app.kubernetes.io/name: docketclock
    app.kubernetes.io/component: migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docketclock
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ .Values.migrations.command | toJson }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: docketclock-pg-app # CNPG-managed app credentials
                  key: uri
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
