{{- if .Values.migrations.enabled }}
# DocketClock schema migrations — a CNPG-aware Job run BEFORE the app rolls out (never by hand), so the
# append-only observation log + its triggers are provisioned reproducibly. Runs the same image as the
# app and reads the CNPG-managed app DATABASE_URL. Wired as a hook for BOTH delivery paths:
#   • Argo CD PreSync (the GitOps path) and
#   • Helm pre-install/pre-upgrade (the `task app-local` / Tilt path) — so a re-`helm upgrade` re-creates
#     the (immutable) Job instead of failing, AND migrations finish before the Deployments start.
apiVersion: batch/v1
kind: Job
metadata:
  name: docketclock-migrate
  labels:
    app.kubernetes.io/name: docketclock
    app.kubernetes.io/component: migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docketclock
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ .Values.migrations.command | toJson }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: docketclock-pg-app # CNPG-managed app credentials
                  key: uri
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
