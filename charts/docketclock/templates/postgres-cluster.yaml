# CloudNativePG Cluster — the DocketClock Postgres 16 database. The operator generates and rotates
# the app credentials as the Secret `docketclock-pg-app` (keys incl. `uri`). Append-only enforcement
# of the observation log (the trust primitive) is added in Phase 1 via schema triggers + role grants.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: docketclock-pg
spec:
  instances: {{ .Values.postgres.instances }}
  {{- if .Values.postgres.imageName }}
  imageName: {{ .Values.postgres.imageName }}
  {{- end }}
  {{- if .Values.postgres.backup.enabled }}
  # WAL archiving + base backups via the Barman Cloud Plugin (backups PR-2) to the ObjectStore in
  # postgres-objectstore.yaml. HEADS-UP: adding/removing this stanza rolls the Cluster once (sidecar
  # injection) — brief single-instance downtime; the poller's next cycle + API restart absorb it.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true # API-server default — pinned so Argo's git-vs-live diff stays clean (#77 class)
      isWALArchiver: true
      parameters:
        barmanObjectName: docketclock-pg-store
  {{- end }}
  storage:
    size: {{ .Values.postgres.storageSize }}
    {{- if .Values.postgres.storageClass }}
    storageClass: {{ .Values.postgres.storageClass }}
    {{- end }}
  {{- if .Values.postgres.recovery.enabled }}
  # DR seam (backups PR-6, docs/runbooks/restore-from-offsite.md): bootstrap by PITR recovery from
  # the backup ObjectStore instead of initdb. CNPG reads `bootstrap` ONLY at Cluster creation — this
  # is for standing up a REPLACEMENT cluster (Drill B / cloud cutover), never for an existing one.
  bootstrap:
    recovery:
      source: origin
      database: docketclock
      owner: docketclock
      {{- if .Values.postgres.recovery.targetTime }}
      recoveryTarget:
        targetTime: {{ .Values.postgres.recovery.targetTime | quote }}
      {{- end }}
  externalClusters:
    - name: origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: docketclock-pg-store
          serverName: {{ .Values.postgres.recovery.sourceServerName | quote }}
  {{- else }}
  bootstrap:
    initdb:
      database: docketclock
      owner: docketclock
  {{- end }}
