# DocketClock poller Deployment — the differential Regs.gov poll loop (issue #18). A long-running,
# self-rescheduling worker (`tsx src/poll/run.ts`): each cycle it discovers + ingests changed
# open-comment documents, re-polls seen-open windows for withdrawals, and reconciles — advancing the
# persisted cursor. NO Service/Ingress (it serves no HTTP); a single replica (the ingest/reconcile path
# assumes ONE writer — see the CONCURRENCY note in observe.ts), so do NOT scale this beyond 1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docketclock-poller
  labels:
    app.kubernetes.io/name: docketclock
    app.kubernetes.io/component: poller
spec:
  replicas: 1 # single-writer: never >1
  strategy:
    type: Recreate # never run two pollers at once during a rollout (cursor race / double-writer)
  selector:
    matchLabels:
      app.kubernetes.io/name: docketclock
      app.kubernetes.io/component: poller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docketclock
        app.kubernetes.io/component: poller
    spec:
      containers:
        - name: poller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Values-driven so the local overlay can swap plain `tsx` for `tsx watch` (#28 hot-reload).
          command: {{ .Values.poller.command | toJson }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: docketclock-pg-app # CNPG-managed app credentials
                  key: uri
            # The poller reads UPPERCASE REGS_API_KEY; the ESO secret key is lowercase.
            - name: REGS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: docketclock-external
                  key: regs_api_key
            # LLM adjudicator (Slice 3c). selectAdjudicator gates on ADJUDICATOR==gemini AND a non-empty
            # GEMINI_API_KEY; the ESO secret key is lowercase gemini_api_key (empty => null:abstain, safe).
            # ADJUDICATOR is the generic provider SELECTOR (the provider-agnostic seam); the credential is
            # named for its provider (GEMINI_API_KEY) since a key only works with one provider.
            - name: ADJUDICATOR
              value: {{ .Values.adjudicator.provider | quote }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: docketclock-external
                  key: gemini_api_key
                  # OPTIONAL by design — unlike REGS_API_KEY (a hard dependency), the LLM is an optional
                  # enhancement that DEGRADES to null:abstain when absent. Without this, the poller would
                  # CrashLoopBackOff in the window after this chart deploys but before the integrator
                  # re-seeds gemini_api_key into Vault (the synced Secret still lacks the key). optional:true
                  # → GEMINI_API_KEY simply unset → deterministic-only, so polling never goes down for it.
                  optional: true
            - name: GEMINI_MODEL
              value: {{ .Values.adjudicator.model | quote }}
            - name: CHAIN_MAX_ESCALATIONS_PER_CYCLE
              value: {{ .Values.adjudicator.maxEscalationsPerCycle | quote }}
            # Cadence + liveness heartbeat path. POLLER_HEARTBEAT_FILE is set ONLY here (k8s), so the
            # loop writes a heartbeat in-cluster but not on a bare local `tsx run.ts` run.
            - name: POLL_INTERVAL_MS
              value: {{ .Values.poller.pollIntervalMs | quote }}
            - name: POLLER_HEARTBEAT_FILE
              value: {{ .Values.poller.heartbeat.file | quote }}
          # LIVENESS (#25): no HTTP server here, so this is an EXEC probe over the heartbeat file the poll
          # loop rewrites at the end of every settled cycle (src/poll/run.ts -> writeHeartbeat). A hung /
          # zombie loop stops updating it; once it is older than 2x the poll interval the probe fails and
          # K8s restarts THE one pod — safe because strategy:Recreate + replicas:1 preserve the single-
          # writer invariant across the restart. Threshold is derived from pollIntervalMs (ms -> s, x2) so
          # it can never drift from the cadence. The path is bound + quoted (defensive: tolerates a future
          # heartbeat.file with spaces/metachars), and a missing file is made EXPLICIT via `[ -f ]` —
          # short-circuits to a non-zero exit -> probe fails -> restart (rather than leaning on the
          # arithmetic blowing up on empty `stat` output). BusyBox `stat -c %Y` / ash `$(( ))` /
          # `[ -f ]` all verified on node:24-alpine.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'f="{{ .Values.poller.heartbeat.file }}"; [ -f "$f" ] && test $(( $(date +%s) - $(stat -c %Y "$f") )) -lt {{ mul (div .Values.poller.pollIntervalMs 1000) 2 }}'
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
