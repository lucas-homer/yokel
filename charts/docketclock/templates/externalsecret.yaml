# ExternalSecret — materializes the K8s Secret `docketclock-external` from Vault
# (secret/docketclock/external). The app consumes it via envFrom.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docketclock-external
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: docketclock-external
    creationPolicy: Owner
  data:
  {{- range .Values.externalSecret.keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $.Values.externalSecret.vaultPath }}
        property: {{ . }}
  {{- end }}
