apiVersion: v1
kind: Service
metadata:
  name: docketclock
  labels:
    app.kubernetes.io/name: docketclock
spec:
  selector:
    app.kubernetes.io/name: docketclock
    app.kubernetes.io/component: api # API only — never route HTTP to the poller workload
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
