# Shared defaults for the docketclock chart. Env overlays: values-local.yaml / values-cloud.yaml.
# "Same shapes, different scale and seams" — only scale/seam values differ between dev and prod.

replicaCount: 1

image:
  # Our built image (apps/docketclock/Dockerfile). Locally it is `docker build`-ed and loaded into the
  # k3d nodes via `k3d image import` (or Tilt) — hence pullPolicy IfNotPresent and the plain name.
  # TODO(phase-3): publish to a real registry + CI-built tags for the cloud/Argo path.
  repository: docketclock
  tag: local
  pullPolicy: IfNotPresent

service:
  # The ingress/Service fronts on 80; the Fastify API listens on 8080 inside the pod.
  port: 80
  targetPort: 8080

# Per-workload entrypoints. ONE image (apps/docketclock/Dockerfile) runs all three workloads; the chart
# picks the `command:` per workload. Default = plain `tsx` (prod / Argo). The local overlay
# (values-local.yaml) swaps api + poller to `tsx watch` for Tilt hot-reload (#28). Migrations are
# DELIBERATELY left on plain `tsx` in BOTH overlays: the migrate Job is one-shot and MUST exit, but
# `tsx watch` never exits — it would hang the pre-sync hook forever.
api:
  command: ["pnpm", "exec", "tsx", "src/api/run.ts"]

ingress:
  enabled: true
  className: traefik
  host: docketclock.local

# CloudNativePG Cluster — Postgres self-manages its own creds (the `<cluster>-app` Secret); ESO is NOT
# in this path. imageName is PINNED (was "" => operator default, which silently tracked the latest major
# and drifted prod to PG18 while CI/tests ran PG16 — that version skew let a PG18-only `= any($1)` parse
# error reach the live poller). Pinned to PG18 to MATCH what the cluster already runs and what CI now
# tests against (see .github/workflows/ci.yml). Bump deliberately, in lockstep with CI.
postgres:
  instances: 1
  imageName: "ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie"
  storageSize: 1Gi
  storageClass: "" # "" = cluster default (local-path on k3d); cloud sets a CSI class
  # PITR backups via the Barman Cloud Plugin (backups PR-2, plans/backups-restore-drill.md): WAL
  # archiving + a nightly base backup to an S3-compatible ObjectStore. The ENGINE + cadence live here
  # (shared shape); the TARGET is a per-overlay seam — values-local points at in-cluster MinIO,
  # values-cloud at Cloudflare R2. enabled=false in this base so a bare `helm template` (and any future
  # overlay that hasn't chosen a target) renders no backup resources. HEADS-UP: flipping enabled rolls
  # the single-instance Cluster once (the plugin injects a sidecar) — brief DB downtime, absorbed by
  # the poller's next cycle + API restart.
  backup:
    enabled: false
    endpointURL: "" # per-overlay: MinIO svc URL locally, R2 endpoint in cloud
    destinationPath: "" # per-overlay: s3://<bucket>/ (buckets created by minio's bucket-init / PR-3)
    retention: "14d" # barman recovery window; enforced at the SOURCE store (R2 mirrors 1:1, PR-3)
    schedule: "0 0 8 * * *" # nightly base backup 08:00 UTC — CNPG cron format INCLUDES seconds
    # Vault path + property names for the store credentials (ESO → the cnpg-backup-creds Secret).
    # Local = the generated MinIO root creds; cloud = the R2 token (different property names — the
    # template maps whatever is named here onto fixed ACCESS_KEY_ID / ACCESS_SECRET_KEY target keys).
    creds:
      vaultPath: backups/minio
      accessKeyProperty: root_user
      secretKeyProperty: root_password

# Schema migrations — run as a CNPG-aware Job (Argo PreSync hook) that applies migrations/*.sql before
# the app rolls out (integrator discipline: migrations are a Job, never `kubectl exec` by hand). Enabled
# in Phase 1 alongside the real image. The Job uses the SAME image as the app and the CNPG-managed
# `docketclock-pg-app` DATABASE_URL (key `uri`). Run via tsx from source (NOT `node dist/...`):
# @yokel/contracts is consumed as TS source, so the runtime is tsx everywhere (see the Dockerfile).
migrations:
  enabled: true
  command: ["pnpm", "exec", "tsx", "src/db/migrate.ts"]

# Poller cadence + liveness (#25). The poll loop self-reschedules every pollIntervalMs (matches the
# default in src/poll/run.ts) and rewrites heartbeat.file at the end of every settled cycle. The poller
# Deployment's exec livenessProbe derives its staleness threshold as 2x pollIntervalMs, so the cadence
# and the probe can never drift: the heartbeat updates once per cycle, so the probe must tolerate up to
# one fully-missed cycle (idle wait + a cycle's own runtime) before it restarts the single pod.
poller:
  command: ["pnpm", "exec", "tsx", "src/poll/run.ts"]
  pollIntervalMs: 900000 # 15 min
  # REGS_MAX_REPOLLS_PER_CYCLE — max seen-open windows the Regs re-poll pass re-fetches per cycle. The
  # eligible set is the whole stale open backlog (worst case ~all open windows at once when regs is first
  # enabled / after an outage); this budget bounds the per-cycle request burst so it can't blow regs.gov's
  # ~1,000 req/hr quota and stall the cycle on a 429 back-off. Stalest-first, the tail defers to next cycle
  # (drains over cycles, no starvation). 200/cycle at the 15m cadence ≈ 800/hr, under quota with headroom.
  maxRepollsPerCycle: 200
  heartbeat:
    file: /tmp/poller-heartbeat
  # The poller serves no API HTTP, so it runs a standalone /metrics listener (src/metrics-server.ts) on
  # this port for Prometheus to scrape (Slice B / PR-B2). 9464 is the OpenMetrics convention and the code
  # default (METRICS_PORT); kept in values so the chart annotation, env, and containerPort stay in lockstep.
  metricsPort: 9464

# LLM adjudicator (chain-seam escalation, Slice 3). Activation is gated by BOTH provider==gemini AND a
# non-empty gemini_api_key (from Vault via ESO). With the key empty (the seeded default) the poller runs
# null:abstain — byte-identical to deterministic-only, so this chart is SAFE/dormant until a real key is
# seeded. ACTIVATION needs no Helm/values change, but is NOT automatic: (1) seed a real gemini_api_key into
# Vault, (2) let ESO refresh the docketclock-external Secret (its refreshInterval, ≤1h, or force it), then
# (3) RESTART the poller pod — GEMINI_API_KEY is a secretKeyRef env read at pod start, so a running pod will
# not pick up the new value until it rolls (`kubectl -n docketclock rollout restart deploy/docketclock-poller`).
adjudicator:
  provider: gemini # selectAdjudicator gate; "null"/unset disables regardless of key
  model: gemini-2.5-flash
  maxEscalationsPerCycle: 25 # CHAIN_MAX_ESCALATIONS_PER_CYCLE — max FRESH LLM calls (cache misses) per
  # cycle; cache hits are free and uncapped, so a backlog of ambiguous pairs drains over cycles without
  # starving any pair. Tunable: bound on per-cycle Gemini cost, not on coverage.

# NOTE: the `vault-backend` ClusterSecretStore (the ESO → Vault seam these ExternalSecrets reference) used
# to live in this chart but was hoisted to a platform-tier Argo app (#51) — it's cluster-scoped and shared
# with observability. See infra/argocd/manifests/vault-backend/clustersecretstore.yaml. This chart now only
# declares the ExternalSecret that *consumes* the store (below).

# External-origin secrets pulled Vault -> K8s Secret `docketclock-external`. The app maps the (lowercase)
# secret keys to the UPPERCASE env vars it actually reads via explicit secretKeyRef (see the Deployments):
#   regs_api_key -> REGS_API_KEY (poller), docketclock_api_keys -> DOCKETCLOCK_API_KEYS (API),
#   gemini_api_key -> GEMINI_API_KEY (poller). ESO is all-or-nothing: every key here MUST be seeded in Vault
# (infra/scripts/vault-seed.sh) or the whole sync fails.
externalSecret:
  refreshInterval: 1h
  vaultPath: docketclock/external
  keys:
    - regs_api_key
    - docketclock_api_keys # comma-separated API keys the Delivery API accepts (X-Api-Key)
    - gemini_api_key # gemini credential for the poller's chain-seam adjudicator (empty => null:abstain)
    - webhook_hmac_secret

# Sized for a Node 24 + tsx process (the API / poller / migrate runner). The earlier 128Mi limit was
# for the traefik/whoami placeholder and OOM-kills our real runtime — Node + tsx baseline alone exceeds
# it. 512Mi gives headroom for tsx transpilation + fastify/swagger + the postgres driver.
resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    memory: 512Mi
