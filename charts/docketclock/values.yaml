# Shared defaults for the docketclock chart. Env overlays: values-local.yaml / values-cloud.yaml.
# "Same shapes, different scale and seams" — only scale/seam values differ between dev and prod.

replicaCount: 1

image:
  # PLACEHOLDER for the platform tracer bullet — proves Service/Ingress/secret/DB wiring end to end.
  # Phase 1 swaps this for our built image (apps/docketclock) + the Tilt inner-loop.
  repository: traefik/whoami
  tag: v1.10.4
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: traefik
  host: docketclock.local

# CloudNativePG Cluster — Postgres self-manages its own creds (the `<cluster>-app` Secret); ESO is NOT
# in this path. imageName empty => operator default; pin an exact 16.x tag in Phase 1.
postgres:
  instances: 1
  imageName: ""
  storageSize: 1Gi
  storageClass: "" # "" = cluster default (local-path on k3d); cloud sets a CSI class

# Schema migrations — run as a CNPG-aware Job (Argo PreSync hook) that applies migrations/*.sql before
# the app rolls out (integrator discipline: migrations are a Job, never `kubectl exec` by hand). DISABLED
# until apps/docketclock has a real built image — the placeholder `traefik/whoami` can't run the runner.
# Phase 1 sets this true together with the Dockerfile + image swap. The Job uses the SAME image as the
# app and the CNPG-managed `docketclock-pg-app` DATABASE_URL (key `uri`).
migrations:
  enabled: false
  command: ["node", "dist/db/migrate.js"]

# Vault backend for External Secrets (dev token auth locally; cloud uses the kubernetes auth method).
vault:
  server: http://vault.vault.svc:8200
  path: secret # kv-v2 mount
  version: v2
  tokenSecret:
    name: vault-token
    namespace: external-secrets
    key: token

# External-origin secrets pulled Vault -> K8s Secret `docketclock-external`.
externalSecret:
  refreshInterval: 1h
  vaultPath: docketclock/external
  keys:
    - regs_api_key
    - anthropic_api_key
    - webhook_hmac_secret

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
