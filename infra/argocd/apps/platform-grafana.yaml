# Grafana — the visualization layer (Slice A / PR-A2). Prometheus is pre-provisioned as the default
# datasource (metrics, Slice B / PR-B2) with Loki alongside it (logs), so Explore works the moment the
# pod is up. Admin creds come from Vault via ESO (never
# inline): the ExternalSecret in extraObjects materializes the `grafana-admin` Secret from
# secret/observability/grafana, mirroring the docketclock ExternalSecret pattern. PERSISTENT
# (2Gi PVC): grafana.db (sessions, UI password changes, silences, starred boards) survives pod
# rolls — before this, every roll wiped sessions and reverted a UI-set password to the seeded
# creds. Dashboards/rules/datasources still come from the provisioning below (git wins on those).
# Exposed by `task grafana` port-forward (svc/grafana :80 -> container :3000).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    # after operators (ESO/CNPG at "0") and after the vault-backend ClusterSecretStore (now its own
    # platform-tier app, platform-secretstore.yaml, wave "1" — #51), which this app's grafana-admin
    # ExternalSecret references. The store therefore exists before this app's ExternalSecret is created.
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    # grafana-community/* is the live home of the Grafana charts — the old grafana/grafana chart is
    # flagged `deprecated: true` upstream and migrated here (https://github.com/grafana-community/helm-charts).
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: "12.7.1"
    helm:
      values: |
        # Persist grafana.db so sessions + UI password changes survive pod rolls (they didn't on
        # emptyDir: every platform apply → fresh pod → logged out + password reset to the seeded
        # value). local-path (k3d default SC) provisions it. Provisioned dashboards/rules are NOT
        # in scope of this claim — they re-apply from these values each start either way.
        persistence:
          enabled: true
          size: 2Gi
        # local-path PVCs are ReadWriteOnce and the chart's default RollingUpdate would deadlock a
        # roll: the NEW pod can't mount the volume while the OLD one still holds it (Pending until
        # progressDeadline). Recreate kills the old pod first — brief Grafana downtime per roll,
        # which alert evaluation tolerates (rules resume on start; the dead-man CronJob covers the
        # gap the other way).
        # rollingUpdate MUST be explicitly nulled: the live Deployment carries a materialized
        # spec.strategy.rollingUpdate block from its RollingUpdate days, apply-merge KEEPS fields
        # the manifest merely omits, and the apiserver rejects type=Recreate alongside
        # rollingUpdate ("Forbidden: may not be specified") — the #100 rollout stuck on exactly
        # this. null in the rendered YAML = delete-on-merge.
        deploymentStrategy:
          type: Recreate
          rollingUpdate: null
        # No Helm test pod — keep the namespace lean.
        testFramework:
          enabled: false
        service:
          type: ClusterIP
          port: 80
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        # Admin creds from the ESO-materialized grafana-admin Secret (see extraObjects below).
        admin:
          existingSecret: grafana-admin
          userKey: admin_user
          passwordKey: admin_password
        # Alerting receiver secret (Slice V / PR-V3): every key of the ESO-materialized
        # grafana-alerting Secret becomes a pod env var (ALERTING_NTFY_URL), which the provisioned
        # contact point below consumes via ${ALERTING_NTFY_URL} — Grafana interpolates $VAR in
        # provisioning files at read time, so the ntfy topic URL (secret: whoever knows the topic
        # can read AND spoof alerts) never appears in git or a ConfigMap. Env is read at pod START:
        # after rotating the Vault value, force-sync the ExternalSecret and roll this Deployment
        # (scripts/seed-alerting-secrets.sh does both).
        envFromSecret: grafana-alerting
        # Pre-provision datasources: Prometheus (metrics, DEFAULT — Slice B / PR-B2) + Loki (logs).
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                access: proxy
                # The prometheus chart's server Service (release `prometheus` -> `prometheus-server`),
                # ClusterIP :80. Default datasource so ad-hoc PromQL + dashboards resolve here.
                url: http://prometheus-server.observability.svc.cluster.local
                isDefault: true
              - name: Loki
                type: loki
                uid: loki
                access: proxy
                url: http://loki.observability.svc.cluster.local:3100
                # No longer default (Prometheus is) — still the log datasource for Explore + log panels.
                isDefault: false
                jsonData:
                  maxLines: 1000

        # Dashboards + unified alerting (Slice B / PR-B3). Provisioned via the chart's file provider;
        # dashboards are self-contained JSON (no gnetId/url fetch — the init container's -skf curl would
        # fail-fast and block Grafana boot). Alert rules scope by app_kubernetes_io_component so the
        # cross-process gauge leaks (db_up=0 on the poller, heartbeat=0 on the API) never false-fire.
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
            - name: docketclock
              orgId: 1
              folder: DocketClock
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/docketclock
        dashboards:
          docketclock:
            docketclock-app:
              json: |-
                {
                  "uid": "docketclock-app",
                  "title": "DocketClock \u2014 App",
                  "tags": [
                    "docketclock",
                    "observability"
                  ],
                  "schemaVersion": 39,
                  "editable": true,
                  "graphTooltip": 1,
                  "time": {
                    "from": "now-6h",
                    "to": "now"
                  },
                  "timezone": "browser",
                  "refresh": "30s",
                  "templating": {
                    "list": []
                  },
                  "annotations": {
                    "list": []
                  },
                  "panels": [
                    {
                      "id": 1,
                      "type": "row",
                      "title": "Health",
                      "collapsed": false,
                      "gridPos": {
                        "h": 1,
                        "w": 24,
                        "x": 0,
                        "y": 0
                      },
                      "panels": []
                    },
                    {
                      "id": 2,
                      "type": "stat",
                      "title": "Poller heartbeat age",
                      "description": "Seconds since the poller last settled a cycle. >2700s (3x the 15m interval) = stalled.",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "gridPos": {
                        "h": 4,
                        "w": 6,
                        "x": 0,
                        "y": 1
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "s",
                          "mappings": [],
                          "thresholds": {
                            "mode": "absolute",
                            "steps": [
                              {
                                "color": "green",
                                "value": null
                              },
                              {
                                "color": "yellow",
                                "value": 1800
                              },
                              {
                                "color": "red",
                                "value": 2700
                              }
                            ]
                          },
                          "color": {
                            "mode": "thresholds"
                          }
                        },
                        "overrides": []
                      },
                      "options": {
                        "colorMode": "background",
                        "graphMode": "area",
                        "reduceOptions": {
                          "calcs": [
                            "lastNotNull"
                          ],
                          "fields": "",
                          "values": false
                        },
                        "textMode": "auto"
                      },
                      "targets": [
                        {
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "editorMode": "code",
                          "expr": "time() - max(docketclock_poller_last_heartbeat_seconds{app_kubernetes_io_component=\"poller\"})",
                          "legendFormat": "__auto",
                          "range": false,
                          "instant": true,
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "id": 3,
                      "type": "stat",
                      "title": "DB up (API)",
                      "description": "db_up is an API concept (/healthz select 1); scoped to the API pod.",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
