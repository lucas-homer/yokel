        alerting:
          rules.yaml:
            apiVersion: 1
            groups:
            - orgId: 1
              name: docketclock
              folder: DocketClock
              interval: 1m
              rules:
              - uid: poller-stalled
                title: Poller stalled
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: time() - max(docketclock_poller_last_heartbeat_seconds{app_kubernetes_io_component="poller"})
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 2700
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: NoData
                execErrState: Error
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: "The poller has not settled a cycle in >45m (3x the 15m interval) \u2014 the loop is hung or the pod is down."
              - uid: llm-error-spike
                title: LLM adjudicator error spike
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: (sum(increase(docketclock_chain_llm_calls_total{app_kubernetes_io_component="poller"}[15m])) or vector(0)) - (sum(increase(docketclock_llm_calls_total{app_kubernetes_io_component="poller"}[15m])) or vector(0))
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 3
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: NoData
                execErrState: Error
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "LLM attempts (chain_llm_calls) minus successful generations (llm_calls) exceeded 3 over 15m \u2014 the provider is erroring."
              - uid: readiness-down
                title: API readiness down (DB unreachable)
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: min(docketclock_db_up{app_kubernetes_io_component="api"})
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: lt
                        params:
                        - 1
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: NoData
                execErrState: Error
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: "The API's DB ping (db_up) has read 0 for 5m \u2014 /readyz is failing and the pod is out of the Service rotation."
          contactpoints.yaml:
            apiVersion: 1
            contactPoints:
            - orgId: 1
              name: local-noop
              receivers:
              - uid: local-noop
                type: webhook
                settings:
                  url: http://127.0.0.1:9999/alerts
                disableResolveMessage: false
          policies.yaml:
            apiVersion: 1
            policies:
            - orgId: 1
              receiver: local-noop
              group_by:
              - grafana_folder
              - alertname
        # Ship the ESO ExternalSecret with this same Argo app. Note: only the ExternalSecret is applied
        # during sync — ESO then materializes the grafana-admin Secret ASYNCHRONOUSLY once it reads Vault,
        # so Grafana may briefly wait on the Secret on a first/cold sync.
        extraObjects:
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: grafana-admin
              namespace: observability
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-admin
                creationPolicy: Owner
              data:
                - secretKey: admin_user
                  remoteRef:
                    key: observability/grafana
                    property: admin_user
                - secretKey: admin_password
                  remoteRef:
                    key: observability/grafana
                    property: admin_password
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  # The ExternalSecret CRD/ESO server-default several fields our grafana-admin manifest doesn't set
  # (remoteRef conversionStrategy / decodingStrategy / metadataPolicy / nullBytePolicy, and
  # target.deletionPolicy). Argo otherwise reports these server-owned defaults as permanent drift, leaving
  # this app forever OutOfSync and masking REAL drift. Ignore exactly those fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      name: grafana-admin
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
