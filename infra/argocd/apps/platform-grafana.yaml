                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 12,
                        "y": 18
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "short",
                          "custom": {
                            "drawStyle": "line",
                            "lineInterpolation": "linear",
                            "fillOpacity": 10,
                            "showPoints": "never",
                            "spanNulls": true
                          }
                        },
                        "overrides": []
                      },
                      "options": {
                        "legend": {
                          "displayMode": "list",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "desc"
                        }
                      },
                      "targets": [
                        {
                          "datasource": {
                            "type": "prometheus",
                            "uid": "prometheus"
                          },
                          "editorMode": "code",
                          "expr": "sum by (phase) (kube_pod_status_phase)",
                          "legendFormat": "{{phase}}",
                          "range": true,
                          "instant": false,
                          "refId": "A"
                        }
                      ]
                    }
                  ]
                }
        alerting:
          rules.yaml:
            apiVersion: 1
            groups:
            - orgId: 1
              name: docketclock
              folder: DocketClock
              interval: 1m
              rules:
              - uid: poller-stalled
                title: Poller stalled
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: time() - (max(docketclock_poller_last_heartbeat_seconds{app_kubernetes_io_component="poller"}) or vector(0))
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 2700
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: NoData
                execErrState: Error
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: "The poller has not settled a cycle in >45m (3x the 15m interval) \u2014 the loop is hung or the pod is down."
              # ASSUMPTION (revisit when notice-kind adjudication ships): errors = attempts − successes =
              # chain_llm_calls_total − llm_calls_total. This holds ONLY while chain adjudication is the sole
              # caller of the shared MetricsTracer. llm_calls_total has no `kind` label, so once notice-kind
              # adjudication feeds the same tracer, its successes inflate llm_calls_total and this subtraction
              # skews low (may stop crossing >3). Fix then: add a `kind` label to llm_calls_total and scope
              # this to kind="chain". Tracked as a follow-up to the metrics inventory in observability-metrics.md.
              - uid: llm-error-spike
                title: LLM adjudicator error spike
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: (sum(increase(docketclock_chain_llm_calls_total{app_kubernetes_io_component="poller"}[15m])) or vector(0)) - (sum(increase(docketclock_llm_calls_total{app_kubernetes_io_component="poller"}[15m])) or vector(0))
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 3
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: NoData
                execErrState: Error
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "LLM attempts (chain_llm_calls) minus successful generations (llm_calls) exceeded 3 over 15m \u2014 the provider is erroring."
              - uid: readiness-down
                title: API readiness down (DB unreachable)
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: min(docketclock_db_up{app_kubernetes_io_component="api"}) or vector(0)
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: lt
                        params:
                        - 1
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: NoData
                execErrState: Error
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: "The API's DB ping (db_up) has read 0 for 5m \u2014 /readyz is failing and the pod is out of the Service rotation."
              # Per-pass ingest-freshness (#91): the regs.gov key outage of 2026-07-09..14 never paged
              # because only the CYCLE heartbeat was watched \u2014 the regs pass threw every cycle for five
              # days while fr kept the heartbeat green. pass_failures_total increments once per pass
              # that throws and is isolated, so ">2.5 over 1h" = 3+ failed cycles at the 15m cadence:
              # one transient API blip (a single failure) never pages, a sustained outage pages ~50m in.
              # One alert INSTANCE per `pass` label (fr / regs / chain / verify \u2014 a repeatedly-failing
              # chain or verify pass is the same silent single-stage blindness).
              #
              # noDataState OK \u2014 deliberately OPPOSITE of the siblings: the counter series only exists
              # once a pass has failed at least once since pod start, so "no data" here MEANS zero
              # failures (healthy), not a broken pipeline. (Pipeline breakage is covered by the
              # poller-stalled rule's vector(0) fallback and the dead-man switch.) Resolve after
              # recovery is NOT instant: the [1h] range still sees the outage-era increments until they
              # age out, so expect the resolve notification ~30-60m after the fix lands (drill timing).
              - uid: pass-failing
                title: Poll pass failing
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: sum by (pass) (increase(docketclock_poll_pass_failures_total{app_kubernetes_io_component="poller"}[1h]))
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 2.5
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: OK
                execErrState: Error
                for: 5m
                labels:
                  severity: critical
                annotations:
                  # {{ "{{ \u2026 }}" }} \u2014 the grafana chart runs alerting values through Helm `tpl`, so a
                  # bare {{ $labels.pass }} is parsed as a HELM variable and breaks `helm template`
                  # (CI's inlined-values render). The outer Go-template emits the braces literally;
                  # Grafana then expands $labels at notification time. Siblings never hit this \u2014 this
                  # is the first rule to template a label into its summary.
                  summary: "Poll pass '{{ \"{{ $labels.pass }}\" }}' threw in 3+ cycles over the last hour while the cycle heartbeat stayed green \u2014 single-pass blindness (fr/regs: that source's ingest is dark; chain/verify: that stage is down). For regs, first suspect the API key (403 API_KEY_INVALID in poller logs) \u2014 rotate with 'task -d infra regs-key'. (#91)"
            # --- Backups (PR-5, plans/backups-restore-drill.md). Routes to local-noop like everything
            # else until Slice V's V3 lands a real receiver. Metric sources: cnpg_objectstore_* comes
            # from kube-state-metrics customResourceState over the barman ObjectStore CR (with plugin
            # backups the Cluster status backup fields are EMPTY \u2014 the PR-2 discovery), and
            # cnpg_pg_stat_archiver_* from the cnpg-pods scrape job (both in platform-prometheus.yaml).
            - orgId: 1
              name: backups
              folder: Backups
              interval: 5m
              rules:
              # noDataState Alerting: if the ObjectStore metric disappears (KSM broken, CRS config
              # regressed, CRD moved), backup-recoverability reporting is DOWN and that IS the alert.
              - uid: backup-base-stale
                title: Base backup stale (>26h)
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: time() - cnpg_objectstore_last_successful_backup_time
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 93600
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: Alerting
                execErrState: Error
                for: 30m
                labels:
                  severity: warning
                annotations:
                  summary: "A CNPG ObjectStore's lastSuccessfulBackupTime is older than 26h (nightly cadence + slack) \u2014 base backups have stopped landing, the PITR window has stopped advancing."
              # last_failed_time > last_archived_time == the MOST RECENT archive attempt failed and no
              # success since. Both are -1 sentinels when null, so never-failed stays negative (quiet)
              # and failed-before-first-success goes positive (fires). WAL is the RPO backbone (\u22645min).
              - uid: backup-wal-archiving-failing
                title: WAL archiving failing
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: max by (namespace, cluster) (cnpg_pg_stat_archiver_last_failed_time{job="cnpg-pods"} - cnpg_pg_stat_archiver_last_archived_time{job="cnpg-pods"})
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 0
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: NoData
                execErrState: Error
                for: 15m
                labels:
                  severity: critical
                annotations:
                  summary: "pg_stat_archiver's last archive attempt failed with no success since (15m sustained) \u2014 WAL is not reaching MinIO and the \u22645min RPO is eroding."
              # One rule per cadence tier; a job that has SUCCEEDED before and then stops advancing
              # fires here. (Fresh-install edge: a job that has NEVER succeeded has no series \u2014 only
              # full-query NoData alerts, so per-job absence before first success is a drill concern.)
              - uid: backup-cronjob-stale-daily
                title: Nightly backup CronJob stale (>26h)
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: time() - kube_cronjob_status_last_successful_time{namespace=~"docketclock|langfuse|vault", cronjob=~"docketclock-pg-dump|langfuse-db-dump|vault-snapshot"}
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 93600
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: Alerting
                execErrState: Error
                for: 30m
                labels:
                  severity: warning
                annotations:
                  summary: "A nightly backup CronJob (pg_dump docketclock/langfuse, vault-snapshot) has not succeeded in >26h \u2014 the restore-anywhere tier is going stale."
              - uid: backup-cronjob-stale-hourly
                title: R2 mirror CronJob stale (>3h)
                condition: C
                data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    editorMode: code
                    expr: time() - kube_cronjob_status_last_successful_time{namespace="backups", cronjob="r2-mirror"}
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  datasourceUid: __expr__
                  model:
                    type: threshold
                    refId: C
                    expression: A
                    datasource:
                      type: __expr__
                      uid: __expr__
                    conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params:
                        - 10800
                        - 0
                      operator:
                        type: and
                      query:
                        params:
                        - C
                      reducer:
                        type: last
                    intervalMs: 1000
                    maxDataPoints: 43200
                noDataState: Alerting
                execErrState: Error
                for: 30m
                labels:
                  severity: warning
                annotations:
                  summary: "The hourly r2-mirror CronJob has not succeeded in >3h (3 missed runs) \u2014 the offsite copy is falling behind and the \u22641h offsite RPO is blown."
          contactpoints.yaml:
            apiVersion: 1
            contactPoints:
            # ntfy (Slice V / PR-V3): hosted push to a phone. The URL is the full publish endpoint
            # https://ntfy.sh/<topic>?template=grafana — ntfy's built-in `grafana` template turns the
            # webhook JSON into a readable title/message. It arrives via env (see envFromSecret above);
            # until a real topic is seeded, the Vault placeholder is the old local-noop URL, so alerts
            # keep no-op'ing instead of publishing to a guessable public topic.
            - orgId: 1
              name: ntfy
              receivers:
              - uid: ntfy
                type: webhook
                settings:
                  url: ${ALERTING_NTFY_URL}
                  httpMethod: POST
                disableResolveMessage: false
            # Kept as the documented rollback target (plans/verification-accuracy.md): flip the policy
            # receiver back to local-noop to silence delivery without touching rules or secrets.
            # (Provisioned alerting is re-applied from these values each start — git wins over any
            # UI edit here even now that grafana.db persists.)
            - orgId: 1
              name: local-noop
              receivers:
              - uid: local-noop
                type: webhook
                settings:
                  url: http://127.0.0.1:9999/alerts
                disableResolveMessage: false
          policies.yaml:
            apiVersion: 1
            policies:
            - orgId: 1
              receiver: ntfy
              group_by:
              - grafana_folder
              - alertname
        # Ship the ESO ExternalSecret with this same Argo app. Note: only the ExternalSecret is applied
        # during sync — ESO then materializes the grafana-admin Secret ASYNCHRONOUSLY once it reads Vault,
        # so Grafana may briefly wait on the Secret on a first/cold sync.
        extraObjects:
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: grafana-admin
              namespace: observability
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-admin
                creationPolicy: Owner
              data:
                - secretKey: admin_user
                  remoteRef:
                    key: observability/grafana
                    property: admin_user
                - secretKey: admin_password
                  remoteRef:
                    key: observability/grafana
                    property: admin_password
          # Alerting receiver URL (PR-V3) — secretKey doubles as the pod ENV VAR name via
          # envFromSecret, hence the UPPERCASE. Vault path seeded by vault-seed.sh (placeholder)
          # and patched to a real topic by scripts/seed-alerting-secrets.sh.
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: grafana-alerting
              namespace: observability
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-alerting
                creationPolicy: Owner
              data:
                - secretKey: ALERTING_NTFY_URL
                  remoteRef:
                    key: observability/alerting
                    property: ntfy_url
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  # The ExternalSecret CRD/ESO server-default several fields our grafana-admin manifest doesn't set
  # (remoteRef conversionStrategy / decodingStrategy / metadataPolicy / nullBytePolicy, and
  # target.deletionPolicy). Argo otherwise reports these server-owned defaults as permanent drift, leaving
  # this app forever OutOfSync and masking REAL drift. Ignore exactly those fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      name: grafana-admin
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
    - group: external-secrets.io
      kind: ExternalSecret
      name: grafana-alerting
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
