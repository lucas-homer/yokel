# Grafana — the visualization layer (Slice A / PR-A2). Loki is pre-provisioned as the default
# datasource so Explore works the moment the pod is up. Admin creds come from Vault via ESO (never
# inline): the ExternalSecret in extraObjects materializes the `grafana-admin` Secret from
# secret/observability/grafana, mirroring the docketclock ExternalSecret pattern. Ephemeral
# (persistence off) — dashboards arrive via provisioning later. Exposed by `task grafana`
# port-forward (svc/grafana :80 -> container :3000).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
    # after operators (ESO/CNPG at "0") and after the vault-backend ClusterSecretStore (now its own
    # platform-tier app, secretstore.yaml, wave "0" — #51), which this app's grafana-admin ExternalSecret
    # references. The store therefore exists before this app's ExternalSecret is created.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    # grafana-community/* is the live home of the Grafana charts — the old grafana/grafana chart is
    # flagged `deprecated: true` upstream and migrated here (https://github.com/grafana-community/helm-charts).
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: "12.7.1"
    helm:
      values: |
        persistence:
          enabled: false
        # No Helm test pod — keep the namespace lean.
        testFramework:
          enabled: false
        service:
          type: ClusterIP
          port: 80
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        # Admin creds from the ESO-materialized grafana-admin Secret (see extraObjects below).
        admin:
          existingSecret: grafana-admin
          userKey: admin_user
          passwordKey: admin_password
        # Pre-provision Loki as the default datasource.
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                uid: loki
                access: proxy
                url: http://loki.observability.svc.cluster.local:3100
                isDefault: true
                jsonData:
                  maxLines: 1000
        # Ship the ESO ExternalSecret with this same Argo app. Note: only the ExternalSecret is applied
        # during sync — ESO then materializes the grafana-admin Secret ASYNCHRONOUSLY once it reads Vault,
        # so Grafana may briefly wait on the Secret on a first/cold sync.
        extraObjects:
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: grafana-admin
              namespace: observability
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-admin
                creationPolicy: Owner
              data:
                - secretKey: admin_user
                  remoteRef:
                    key: observability/grafana
                    property: admin_user
                - secretKey: admin_password
                  remoteRef:
                    key: observability/grafana
                    property: admin_password
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  # The ExternalSecret CRD/ESO server-default several fields our grafana-admin manifest doesn't set
  # (remoteRef conversionStrategy / decodingStrategy / metadataPolicy / nullBytePolicy, and
  # target.deletionPolicy). Argo otherwise reports these server-owned defaults as permanent drift, leaving
  # this app forever OutOfSync and masking REAL drift. Ignore exactly those fields.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      name: grafana-admin
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
