# Prometheus — the metrics store for the observability stack (Slice B / PR-B2). A LEAN standalone
# prometheus-community/prometheus deploy (NOT kube-prometheus-stack, which bundles its own Grafana +
# operator and would collide with our Grafana / blow the 12 GiB colima budget). Just: the server
# (5Gi PVC, 7d retention) + kube-state-metrics (pod/deploy/restart metrics) + node-exporter (node
# CPU/mem/disk). Alertmanager + pushgateway are DISABLED — alerting is Grafana unified alerting
# (Slice B / PR-B3), no standalone Alertmanager. Memory limits pinned on every workload, same RAM
# discipline as Loki/Alloy.
#
# SCRAPING IS ANNOTATION-BASED, no prometheus-operator (no CRDs, no extra wave-0 app). The chart's
# bundled `kubernetes-pods` scrape job honors `prometheus.io/{scrape,port,path}` pod annotations —
# docketclock's chart Deployments carry those (API :8080, poller :9464). Reachable in-cluster at
# http://prometheus-server.observability.svc.cluster.local; exposed locally by `task prometheus`.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # after operators (ESO/CNPG at "0"), alongside Loki/Alloy
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: "29.14.0"
    helm:
      values: |
        # --- Prometheus server: lean, persistent, short retention. ---
        server:
          # 7d local TSDB: enough for local trend/alerting, not long-term capacity planning. Survives a
          # pod restart via the PVC (like Loki's 5Gi; Grafana stays ephemeral).
          retention: "7d"
          persistentVolume:
            enabled: true
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          # No web ingress — reached in-cluster / via `task prometheus` port-forward, never exposed.
          service:
            type: ClusterIP
            servicePort: 80
        # --- CNPG instance metrics (backups PR-5): the DB pods expose :9187 but carry no prometheus.io
        # annotations, and adding them via inheritedMetadata would also annotate the Services (double
        # scrape via the kubernetes-service-endpoints job). Instead: a dedicated pod-SD job keyed on the
        # operator's own cnpg.io/cluster label. Feeds the WAL-archiver alert rules in platform-grafana.
        extraScrapeConfigs: |
          - job_name: cnpg-pods
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
                action: keep
                regex: .+
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                action: keep
                regex: metrics
              - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
                target_label: cluster
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
        # --- kube-state-metrics: "see the cluster" (pods/deployments/restarts). Keep, pin the limit. ---
        kube-state-metrics:
          enabled: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 128Mi
          # Backups PR-5: with plugin-based backups CNPG leaves Cluster.status backup fields EMPTY —
          # recoverability truth lives on the barman ObjectStore CR (.status.serverRecoveryWindow, the
          # PR-2 discovery). customResourceState turns those RFC3339 fields into epoch gauges
          # (cnpg_objectstore_*) that the base-backup-age alert can read. KSM needs explicit RBAC for
          # the CRD group.
          rbac:
            extraRules:
              - apiGroups: ["barmancloud.cnpg.io"]
                resources: ["objectstores"]
                verbs: ["list", "watch"]
          customResourceState:
            enabled: true
            config:
              kind: CustomResourceStateMetrics
              spec:
                resources:
                  - groupVersionKind:
                      group: barmancloud.cnpg.io
                      version: v1
                      kind: ObjectStore
                    metricNamePrefix: cnpg_objectstore
                    labelsFromPath:
                      namespace: [metadata, namespace]
                      name: [metadata, name]
                    metrics:
                      - name: last_successful_backup_time
                        help: Last successful base backup per barman server (epoch seconds)
                        each:
                          type: Gauge
                          gauge:
                            path: [status, serverRecoveryWindow]
                            labelFromKey: server
                            valueFrom: [lastSuccessfulBackupTime]
                      - name: first_recoverability_point
                        help: Start of the PITR recovery window per barman server (epoch seconds)
                        each:
                          type: Gauge
                          gauge:
                            path: [status, serverRecoveryWindow]
                            labelFromKey: server
                            valueFrom: [firstRecoverabilityPoint]
        # --- node-exporter: node CPU/mem/disk (a DaemonSet, one per node). Keep, pin the limit. ---
        prometheus-node-exporter:
          enabled: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
        # --- Footgun disablers: alerting is Grafana-managed, and we don't push metrics. ---
        alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
