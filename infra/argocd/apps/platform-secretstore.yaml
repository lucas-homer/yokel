# vault-backend ClusterSecretStore — platform-tier Argo Application (#51).
#
# A directory-type app that applies the raw ClusterSecretStore manifest from git (the chart machinery
# isn't needed for one cluster-scoped CR). This is the first git-sourced PLATFORM app — the others source
# straight from upstream Helm repos — so it only reconciles once this repo is pushed (the repo is public,
# so Argo's repo-server clones it without creds).
#
# sync-wave "1": strictly AFTER the operators (ESO at "0" installs the ClusterSecretStore CRD) and BEFORE
# any consumer (grafana + docketclock are bumped to "2"). This ordering is deterministic on a cold
# app-of-apps bringup — the store never races the CRD into a transient "no matches for kind". The store's
# own CR applies fine before Vault is reachable (ESO just retries the fetch), so the app goes Healthy as
# soon as the CR exists; no crash-coupling to Vault readiness.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secretstore
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/lucas-homer/yokel.git
    targetRevision: main
    path: infra/argocd/manifests/vault-backend
  destination:
    server: https://kubernetes.default.svc
    # ClusterSecretStore is cluster-scoped; this namespace is just where Argo records the app, not where
    # the resource lands.
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
