# minio-root ExternalSecret — backups PR-1. Materializes the MinIO root credentials from Vault via the
# cluster-scoped `vault-backend` ClusterSecretStore (the langfuse-secrets pattern). `task vault-seed`
# seeds `secret/backups/minio` — GENERATED once, never rotated on re-seed (the StatefulSet, the CNPG
# ObjectStores (PR-2), and the rclone/pg_dump CronJobs (PR-3) all read these creds; a silent rotation
# would strand them mid-phase). ESO is all-or-nothing: both keys MUST exist in Vault or the sync fails.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-root
  annotations:
    argocd.argoproj.io/sync-wave: "0" # secret before the StatefulSet (wave "1") that consumes it
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-root
    creationPolicy: Owner
  data:
    - secretKey: root_user
      remoteRef: { key: backups/minio, property: root_user }
    - secretKey: root_password
      remoteRef: { key: backups/minio, property: root_password }
