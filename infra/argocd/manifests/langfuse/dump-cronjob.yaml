# Nightly logical dump for the Langfuse Postgres (backups PR-3) — same two-container shape as the
# docketclock chart's postgres-dump-cronjob template (see its header for the full rationale): version-
# matched pg_dump → emptyDir → mc upload to the shared pgdump bucket (14d ILM retention at the source,
# mirrored to R2 hourly). 08:40 UTC — staggered last in the nightly window (08:00/08:10 base, 08:30 dump).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: langfuse-db-dump
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: "40 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          volumes:
            - name: dump
              emptyDir: {}
          initContainers:
            - name: pg-dump
              # Keep in lockstep with postgres-cluster.yaml's imageName (exact-version pg_dump).
              image: "ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef: { name: langfuse-db-app, key: uri }
              command:
                - sh
                - -c
                - pg_dump "$DATABASE_URL" -Fc -f "/dump/langfuse-$(date -u +%Y%m%dT%H%M%SZ).dump"
              volumeMounts:
                - name: dump
                  mountPath: /dump
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          containers:
            - name: upload
              image: minio/mc:RELEASE.2025-08-13T08-35-41Z
              env:
                - name: ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      { name: cnpg-backup-creds, key: ACCESS_KEY_ID }
                - name: ACCESS_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      { name: cnpg-backup-creds, key: ACCESS_SECRET_KEY }
              command:
                - sh
                - -c
                - |
                  mc alias set backups http://minio.backups.svc:9000 "$ACCESS_KEY_ID" "$ACCESS_SECRET_KEY"
                  mc cp /dump/*.dump backups/pgdump/langfuse/
              volumeMounts:
                - name: dump
                  mountPath: /dump
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 128Mi
