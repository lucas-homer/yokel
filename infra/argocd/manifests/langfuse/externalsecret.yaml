# langfuse-secrets ExternalSecret — Slice C / PR-C1. Materializes Langfuse's app secrets from Vault via
# the cluster-scoped `vault-backend` ClusterSecretStore (the same store grafana-admin uses, hoisted to the
# platform tier in #51). `task vault-seed` seeds `secret/langfuse/config` (dev defaults; override via
# LANGFUSE_* shell env). ESO is all-or-nothing — every key here MUST exist in Vault or the whole sync
# fails (same rule as docketclock-external).
#
# Keys:
#   nextauth_secret / salt / encryption_key — Langfuse server crypto (ENCRYPTION_KEY is 64-hex).
#   init_project_public_key / init_project_secret_key — the project API keypair, pinned via LANGFUSE_INIT_*
#     so the SAME keys can be handed to the poller (PR-C2) with no manual UI step.
#   init_user_password — the initial admin UI login password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "0" # secret before the Deployment (wave "1") that consumes it
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: langfuse-secrets
    creationPolicy: Owner
  data:
    - secretKey: nextauth_secret
      remoteRef: { key: langfuse/config, property: nextauth_secret }
    - secretKey: salt
      remoteRef: { key: langfuse/config, property: salt }
    - secretKey: encryption_key
      remoteRef: { key: langfuse/config, property: encryption_key }
    - secretKey: init_project_public_key
      remoteRef: { key: langfuse/config, property: init_project_public_key }
    - secretKey: init_project_secret_key
      remoteRef: { key: langfuse/config, property: init_project_secret_key }
    - secretKey: init_user_password
      remoteRef: { key: langfuse/config, property: init_user_password }
