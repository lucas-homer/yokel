# vault-backend ClusterSecretStore — the cluster-scoped ESO → Vault seam.
#
# HOISTED OUT OF THE APP CHART (#51): this used to live in charts/docketclock (synced at app sync-wave
# "2"), but it is a cluster-scoped, SHARED resource — both the app's `docketclock-external` ExternalSecret
# AND observability's `grafana-admin` ExternalSecret (sync-wave "1") read it. Keeping it in the app chart
# meant any ExternalSecret that referenced it was created (wave 1) before the store existed (wave 2), and
# coupled platform-tier observability to the app. It now ships as its own platform-tier Argo Application
# (platform-secretstore.yaml, sync-wave "1") so the store exists before any consumer.
#
# DEV uses Vault token auth (the `vault-token` Secret ESO reads from the external-secrets namespace, wired
# by scripts/vault-seed.sh). CLOUD (Phase 3): swap `auth.tokenSecretRef` for the kubernetes auth method
# (workload identity, no static token) — same swap noted in platform-vault.yaml / values-cloud.yaml. Until
# a cloud cluster exists (k3d-first) this stays token-auth.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "secret" # kv-v2 mount
      version: v2
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
