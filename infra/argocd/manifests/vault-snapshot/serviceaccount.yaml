# ServiceAccount the vault-snapshot CronJob runs as (#75) — the identity Vault's k8s-auth binds to
# the raft-snapshot policy (vault-seed.sh writes auth/kubernetes/role/vault-snapshot against exactly
# this name + namespace). Carries NO Kubernetes RBAC: it exists only so the Job pod gets a projected
# JWT to log in with. Renaming it (or moving the app's destination namespace) breaks the role binding
# — change vault-seed.sh in lockstep.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-snapshot
