# minio-backup-creds ExternalSecret — backups PR-4. Materializes the MinIO root credentials in the
# `vault` namespace for the snapshot CronJob's upload step, via the cluster-scoped `vault-backend`
# ClusterSecretStore. Same source path as minio-root (`secret/backups/minio`, seeded once by
# `task vault-seed`, never rotated on re-seed) but mapped to the fixed ACCESS_KEY_ID /
# ACCESS_SECRET_KEY key names the upload containers standardize on (the cnpg-backup-creds pattern).
#
# Yes, the credentials that upload Vault's own snapshots come FROM Vault — that's fine for the
# snapshot path (Vault is up when the CronJob runs; a dead Vault can't snapshot itself either).
# The disaster path doesn't depend on this: restores read from MinIO/R2 with creds from the
# operator's terraform outputs, and the seal-chain backup (backup-vault-keys.sh) is out-of-band.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-backup-creds
  annotations:
    argocd.argoproj.io/sync-wave: "0" # secret before the CronJob (wave "1") that consumes it
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-backup-creds
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef: { key: backups/minio, property: root_user }
    - secretKey: ACCESS_SECRET_KEY
      remoteRef: { key: backups/minio, property: root_password }
