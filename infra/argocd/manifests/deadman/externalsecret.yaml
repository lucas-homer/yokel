# healthchecks.io ping URL for the dead-man CronJob (Slice V / PR-V3). The URL is the credential —
# anyone holding it can keep the check green — so it flows Vault → ESO → Secret → env, never git.
# Path seeded with a placeholder by vault-seed.sh; scripts/seed-alerting-secrets.sh patches the real
# URL once the healthchecks.io check exists.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deadman-ping
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: deadman-ping
    creationPolicy: Owner
  data:
    - secretKey: PING_URL
      remoteRef:
        key: observability/alerting
        property: healthchecks_ping_url
