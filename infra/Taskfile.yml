# DocketClock local platform — the codified runbook (ADR 0009). Run from infra/: `task dev-up`.
# The ONLY imperative seam is installing Argo CD; Argo then reconciles everything else from git/charts.
version: "3"

vars:
  CLUSTER: yokel
  ARGOCD_CHART_VERSION: 9.5.21

tasks:
  dev-up:
    desc: Bring up the full local GitOps stack (colima → k3d → Argo CD → platform → app)
    cmds:
      - task: cluster-up
      - task: bootstrap-argocd
      - task: platform
      - task: vault-transit-init # enable the transit seal so the main Vault can auto-unseal
      - task: vault-seed # init + seed the main Vault (must precede wait-platform: an
      - task: wait-platform #   uninitialized Vault is never Healthy until vault-seed inits it)
      - task: app-local
      - echo "✅ Stack up. 'task status' for state; 'task argocd-ui' for the Argo dashboard."

  cluster-up:
    desc: Start colima if needed, then create the k3d cluster from config
    cmds:
      # --dns: pin public resolvers. On a Tailscale host the lima DNS forwarder (192.168.5.2) is
      # unreliable, which breaks image pulls inside the k3d nodes. If colima is already running
      # without this, `colima restart --dns 1.1.1.1 --dns 8.8.8.8` once.
      - colima status >/dev/null 2>&1 || colima start --cpu 6 --memory 12 --disk 60 --dns 1.1.1.1 --dns 8.8.8.8
      # Create only if absent — checked AFTER colima is up (k3d needs the docker daemon to see the
      # cluster). A no-op task-level `status:` guard would race: it runs before colima starts, so it
      # can't see a cluster living inside a stopped VM and would wrongly try to recreate it.
      # NOTE: this does NOT resume a cluster that exists-but-is-stopped (e.g. after colima was restarted);
      # use `task cluster-restart` for that — it starts the nodes AND repairs the kubelet certs.
      # IP-STABILITY (optional, on a FUTURE recreate only): append `--subnet 172.28.0.0/16` to give the
      # cluster a DEDICATED docker subnet, which makes node IPs far more stable across colima restarts and
      # reduces the kubelet-cert drift below. It is experimental IPAM and only takes effect at create time,
      # so adopt it the next time you `dev-down` + `dev-up`. The guaranteed live fix for drift is
      # `task cluster-restart`.
      - k3d cluster list {{.CLUSTER}} >/dev/null 2>&1 || k3d cluster create --config k3d/yokel.yaml

  cluster-restart:
    desc: Resume the cluster after a colima/Docker restart (start nodes + repair the kubelet serving certs)
    cmds:
      # The cluster and its CNPG PVC survive a colima STOP (they live on the VM disk), so this RESUMES them
      # rather than recreating (which would lose data). Run this whenever colima was stopped/slept and
      # `kubectl` / `tilt` start failing with connection or x509 errors.
      - colima status >/dev/null 2>&1 || colima start --cpu 6 --memory 12 --disk 60 --dns 1.1.1.1 --dns 8.8.8.8
      - k3d cluster start {{.CLUSTER}}
      # KUBELET CERT REPAIR (the load-bearing step). Across a colima restart the k3d node IPs shift on the
      # docker network, but each node's kubelet SERVING cert was issued for its OLD IP — so apiserver→kubelet
      # (kubectl logs/exec/port-forward, Tilt's log stream + port-forwards) fails with
      # `x509: certificate is valid for <old-ip>, not <new-ip>`. A plain `docker restart` of BOTH nodes at
      # once does NOT fix it: k3s only regenerates the serving cert when it is missing, and bouncing both
      # together lets them SWAP docker IPs mid-regeneration (cert ends up issued for the other node's IP).
      # The deterministic repair: DELETE each node's serving cert+key, then restart that node ALONE so k3s
      # regenerates a fresh cert for the node's CURRENT IP, one node at a time (no swap). Idempotent.
      - |
        for node in server-0 agent-0; do
          # Confirm the cert+key are actually GONE before restarting: a bare `... || true` would swallow a
          # failed `docker exec` (e.g. the container is still coming up after `k3d cluster start`) and then
          # restart a node whose STALE cert is still present — silently defeating the deterministic repair.
          # Retry the delete until `docker exec` succeeds (bounded), so the regeneration is guaranteed.
          for t in $(seq 1 15); do
            docker exec k3d-{{.CLUSTER}}-$node rm -f \
              /var/lib/rancher/k3s/agent/serving-kubelet.crt \
              /var/lib/rancher/k3s/agent/serving-kubelet.key 2>/dev/null && break
            sleep 2
          done
          docker restart k3d-{{.CLUSTER}}-$node
          for i in $(seq 1 30); do
            kubectl get node k3d-{{.CLUSTER}}-$node >/dev/null 2>&1 && break
            sleep 2
          done
        done
      # Wait for both nodes Ready, tolerating the brief apiserver downtime from the server-node restart.
      # FAIL LOUDLY on timeout: a fall-through would print the ✅ below on a still-broken cluster AND run the
      # Vault repair against a flaky API. Exit non-zero so the breakage surfaces instead of being masked.
      - |
        ready=0
        for i in $(seq 1 40); do
          [ "$(kubectl get nodes --no-headers 2>/dev/null | grep -c ' Ready ')" = "2" ] && { ready=1; break; }
          sleep 3
        done
        [ "$ready" = "1" ] || { echo "✗ nodes not Ready after 120s — aborting (cluster still broken)"; exit 1; }
      - kubectl get nodes
      # Re-unseal the PERSISTENT transit Vault (it starts sealed on every restart), THEN bounce the main
      # Vault so it auto-unseals against the now-online transit key instead of crashlooping on the 404.
      # Gate on the vault-transit-keys Secret so we SKIP only a genuinely never-seeded cluster — a real
      # unseal FAILURE on a seeded cluster must surface loudly (not be swallowed), so `set -e` aborts here.
      - |
        set -e
        if kubectl -n vault get secret vault-transit-keys >/dev/null 2>&1; then
          bash scripts/vault-transit-unseal.sh
          kubectl -n vault delete pod vault-0 --ignore-not-found >/dev/null 2>&1 || true
        else
          echo "  ↳ transit Vault not initialized yet (no vault-transit-keys Secret) — skipping unseal."
        fi
      # During the outage every ExternalSecret flipped its Ready condition to SecretSyncedError (ESO couldn't
      # reach the sealed/down Vault). The materialized Secrets persist (creationPolicy Owner), so pods keep
      # running — but that stale error lingers until the next refreshInterval (1h), surfacing as a Degraded
      # Argo app (e.g. grafana) despite a healthy pod. Once vault-0 is back Ready (its readiness probe only
      # passes when UNSEALED), force an immediate ESO re-reconcile so secrets + their apps go green now, not
      # in ~1h. Gated on the vault StatefulSet existing, so a never-seeded cluster skips cleanly. (#53)
      - |
        if kubectl -n vault get statefulset vault >/dev/null 2>&1; then
          echo "  ↳ waiting for vault-0 to be Ready (unsealed) before re-syncing ExternalSecrets…"
          ready=0
          for i in $(seq 1 40); do
            [ "$(kubectl -n vault get pod vault-0 -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)" = "True" ] && { ready=1; break; }
            sleep 3
          done
          [ "$ready" = "1" ] || echo "  ↳ WARN: vault-0 not Ready after 120s — force-syncing anyway (ESO will keep retrying)."
          # Bounce every ExternalSecret's force-sync annotation to trigger an immediate reconcile (the same
          # annotation we used by hand for grafana — confirmed to work on the installed ESO version). With no
          # ExternalSecrets present `--all` is a clean no-op.
          if kubectl annotate externalsecret -A --all "force-sync=$(date +%s)" --overwrite 2>/dev/null; then
            echo "  ↳ ExternalSecrets re-synced (skips the ~1h refreshInterval wait)."
          fi
        fi
      - echo "✅ cluster resumed; kubelet certs repaired; transit Vault re-unsealed; ExternalSecrets re-synced. Pods re-race the DB briefly, then settle ('task status')."

  install-boot-recovery:
    desc: Install a LaunchAgent that auto-runs `cluster-restart` after colima starts on every login/boot
    cmds:
      # Makes a reboot self-heal: colima auto-starts (brew service) + this agent then runs cluster-restart
      # (k3d start, kubelet-cert repair, transit-Vault unseal). The mini auto-logs-in as `home`, so the
      # agent fires unattended. The plist is generated here (machine-specific absolute paths) rather than
      # committed. NOTE: with RunAtLoad, a successful bootstrap also runs it ONCE right now — which does a
      # real cluster-restart (brief node churn). Either way it's armed for the next boot.
      - |
        set -e
        LABEL="cc.rostr.yokel.boot-recovery"
        SCRIPT="$(pwd)/scripts/boot-cluster-restart.sh"
        PLIST="$HOME/Library/LaunchAgents/$LABEL.plist"
        LOG="$HOME/Library/Logs/yokel-boot-recovery.log"
        chmod +x "$SCRIPT"
        mkdir -p "$HOME/Library/LaunchAgents" "$HOME/Library/Logs"
        cat > "$PLIST" <<PLISTEOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>Label</key><string>$LABEL</string>
          <key>ProgramArguments</key>
          <array>
            <string>/bin/bash</string>
            <string>$SCRIPT</string>
          </array>
          <key>RunAtLoad</key><true/>
          <key>StandardOutPath</key><string>$LOG</string>
          <key>StandardErrorPath</key><string>$LOG</string>
        </dict>
        </plist>
        PLISTEOF
        plutil -lint "$PLIST"
        # Re-arm cleanly, then load into the logged-in GUI domain (same domain colima's brew service runs
        # in). Best-effort over SSH: if bootstrap can't reach the GUI domain, the plist in ~/Library/
        # LaunchAgents still auto-loads at the NEXT login — which is the case we actually care about.
        launchctl bootout "gui/$(id -u)/$LABEL" 2>/dev/null || true
        launchctl bootstrap "gui/$(id -u)" "$PLIST" 2>/dev/null \
          && echo "✅ installed + armed now (RunAtLoad ran it once). Log: $LOG" \
          || echo "✅ installed ($PLIST). launchctl bootstrap skipped over SSH — it will auto-load at next login. Log: $LOG"

  uninstall-boot-recovery:
    desc: Remove the boot-recovery LaunchAgent
    cmds:
      - |
        LABEL="cc.rostr.yokel.boot-recovery"
        launchctl bootout "gui/$(id -u)/$LABEL" 2>/dev/null || true
        rm -f "$HOME/Library/LaunchAgents/$LABEL.plist"
        echo "✅ removed boot-recovery LaunchAgent (running cluster unaffected)."

  install-drill-cadence:
    desc: Install a LaunchAgent that enforces the drill cadence monthly (runs Drill A, pushes reminders via ntfy)
    cmds:
      # Same idiom as install-boot-recovery: machine-specific plist generated here, never committed.
      # Fires on the 1st of every month at 09:15 local — the Mini is an always-on server, so the tick
      # is not missed to sleep; drill-cadence.sh runs `task drill-pitr` and pushes PASS/FAIL to the
      # ntfy alert topic, plus quarterly (alert-drill) and semi-annual (Drill B) reminders on the
      # months they're due. NO RunAtLoad: a login must not trigger a drill — the calendar does.
      # Deliberately a LaunchAgent + ntfy, not an external scheduler: the cadence has to survive on
      # the Mini alone, with no dependency beyond launchd and the alert topic that already pages.
      - |
        set -e
        LABEL="cc.rostr.yokel.drill-cadence"
        SCRIPT="$(pwd)/scripts/drill-cadence.sh"
        PLIST="$HOME/Library/LaunchAgents/$LABEL.plist"
        LOG="$HOME/Library/Logs/yokel-drill-cadence.log"
        chmod +x "$SCRIPT"
        mkdir -p "$HOME/Library/LaunchAgents" "$HOME/Library/Logs"
        cat > "$PLIST" <<PLISTEOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>Label</key><string>$LABEL</string>
          <key>ProgramArguments</key>
          <array>
            <string>/bin/bash</string>
            <string>$SCRIPT</string>
          </array>
          <key>StartCalendarInterval</key>
          <dict>
            <key>Day</key><integer>1</integer>
            <key>Hour</key><integer>9</integer>
            <key>Minute</key><integer>15</integer>
          </dict>
          <key>StandardOutPath</key><string>$LOG</string>
          <key>StandardErrorPath</key><string>$LOG</string>
        </dict>
        </plist>
        PLISTEOF
        plutil -lint "$PLIST"
        launchctl bootout "gui/$(id -u)/$LABEL" 2>/dev/null || true
        launchctl bootstrap "gui/$(id -u)" "$PLIST" 2>/dev/null \
          && echo "✅ installed — fires monthly (1st, 09:15). Dry-run now: bash scripts/drill-cadence.sh. Log: $LOG" \
          || echo "✅ installed ($PLIST). launchctl bootstrap skipped over SSH — it will auto-load at next login. Log: $LOG"

  uninstall-drill-cadence:
    desc: Remove the drill-cadence LaunchAgent
    cmds:
      - |
        LABEL="cc.rostr.yokel.drill-cadence"
        launchctl bootout "gui/$(id -u)/$LABEL" 2>/dev/null || true
        rm -f "$HOME/Library/LaunchAgents/$LABEL.plist"
        echo "✅ removed drill-cadence LaunchAgent (drills return to manual cadence — see the runbook)."

  bootstrap-argocd:
    desc: Install Argo CD via Helm (the single imperative seam)
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm >/dev/null 2>&1 || true
      - helm repo update argo >/dev/null
      - >
        helm upgrade --install argocd argo/argo-cd
        -n argocd --create-namespace
        --version {{.ARGOCD_CHART_VERSION}}
        -f bootstrap/argocd-values.yaml
        --wait --timeout 6m

  platform:
    desc: Apply the platform Argo Applications (CNPG, ESO, Vault + transit, observability) — Argo syncs them from charts
    cmds:
      # Glob EVERY platform-*.yaml so newly-added platform apps are picked up automatically — a hardcoded
      # list once silently omitted the observability stack (Loki/Alloy/Grafana). The glob deliberately
      # excludes app-docketclock.yaml, which is Tilt-managed locally (not Argo). Apply ORDER doesn't matter:
      # these are Argo Application CRs, so kubectl just registers them — Argo orders the actual resource
      # sync by sync-wave (ESO/Vault at "0", observability at "1"), not by apply order. `set -e` makes the
      # loop fail-fast: without it the loop exits with the LAST iteration's status, masking an earlier
      # failed apply.
      - set -e; for f in argocd/apps/platform-*.yaml; do kubectl apply -f "$f"; done

  vault-transit-init:
    desc: Init + unseal the persistent seal-provider Vault and create the autounseal key (idempotent)
    cmds:
      - bash scripts/vault-transit-init.sh

  vault-transit-unseal:
    desc: Re-unseal the persistent transit Vault from its stored key (after a restart; idempotent)
    cmds:
      - bash scripts/vault-transit-unseal.sh

  wait-platform:
    desc: Wait for the platform Argo Applications to be Healthy, then their CRDs to be established
    cmds:
      # Argo syncs asynchronously after `platform`; wait on the Applications (which exist immediately)
      # rather than raw pods (which may not exist yet) so a clean `task dev-up` doesn't race ahead.
      # `vault` only goes Healthy after vault-seed inits it — which is why vault-seed runs before this.
      - kubectl wait --for=jsonpath='{.status.health.status}'=Healthy application/cnpg application/external-secrets application/vault-transit application/vault -n argocd --timeout=300s
      - kubectl wait --for=condition=Established crd/clusters.postgresql.cnpg.io --timeout=120s
      - kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=120s

  vault-seed:
    desc: Init the main Vault (transit auto-unseal), seed external secrets, wire ESO token auth (idempotent)
    cmds:
      - bash scripts/vault-seed.sh

  regs-key:
    desc: Re-seed the poller's regs.gov API key into Vault from the repo-root .env (REGS_API_KEY) — value never printed
    dir: ..
    cmds:
      # Wraps scripts/seed-docketclock-secrets.sh (stdin-only Vault patch + ESO force-sync + poller
      # restart). Reads the key from the repo-root .env — the canonical local secrets file — so
      # nothing sensitive ever hits the shell history or argv. To seed a DIFFERENT key, call the
      # script directly with REGS_API_KEY set.
      - |
        set -euo pipefail
        # `|| true`: a failing grep would kill the shell before the friendly error prints (#94 review).
        REGS_API_KEY=$(grep '^REGS_API_KEY=' .env 2>/dev/null | cut -d= -f2- | tr -d '\r\n' || true)
        [ -n "$REGS_API_KEY" ] || { echo "✗ REGS_API_KEY not set in .env (repo root)" >&2; exit 1; }
        export REGS_API_KEY
        bash infra/scripts/seed-docketclock-secrets.sh

  backup-status:
    desc: One-shot backup freshness report — PITR windows, newest WAL, dump/snapshot/mirror CronJobs (backups PR-5)
    cmds:
      - bash scripts/backup-status.sh

  drill-pitr:
    desc: "Drill A: scratch PITR restore of docketclock-pg into namespace dr, assert, tear down (backups PR-6; monthly)"
    cmds:
      - bash scripts/drill-pitr.sh

  alert-drill:
    desc: "Alert fire drill: stage a real outage, confirm the ntfy page + resolve reach a phone (quarterly). Modes: `task alert-drill` (poller stalled, ~30m) or `task alert-drill -- ingest` (invalid regs key → Poll pass failing, ~90m; #91)"
    cmds:
      - bash scripts/alert-drill.sh {{.CLI_ARGS}}

  app-local:
    desc: Install the docketclock chart locally (Argo manages it from git once pushed)
    dir: ..
    cmds:
      - >
        helm upgrade --install docketclock charts/docketclock
        -n docketclock --create-namespace
        -f charts/docketclock/values.yaml -f charts/docketclock/values-local.yaml
        --wait --timeout 5m

  dev-down:
    desc: Delete the k3d cluster (colima keeps running)
    cmds:
      - k3d cluster delete {{.CLUSTER}}

  status:
    desc: Argo Applications + key workloads
    cmds:
      - kubectl get applications -n argocd 2>/dev/null || true
      - kubectl get pods -A | grep -E 'argocd|cnpg|external-secrets|vault|docketclock' || true

  argocd-password:
    desc: Print the initial Argo CD admin password
    cmds:
      - 'kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d; echo'

  argocd-ui:
    desc: Port-forward the Argo CD UI to https://localhost:8081 (user admin)
    cmds:
      - kubectl -n argocd port-forward svc/argocd-server 8081:443

  grafana:
    desc: Port-forward Grafana to http://localhost:3000 (admin creds from the grafana-admin Secret / Vault)
    cmds:
      # Grafana service listens on :80 → container :3000. Admin user/pass come from Vault via ESO
      # (secret/observability/grafana); `task vault-seed` seeds it (default admin/admin) — see the
      # Observability section in infra/README.md to override or update the password.
      - kubectl -n observability port-forward svc/grafana 3000:80

  prometheus:
    desc: Port-forward Prometheus to http://localhost:9090 (metrics store; Targets/Graph UI)
    cmds:
      # The prometheus chart's server Service listens on :80 (release `prometheus` -> `prometheus-server`);
      # mapped to localhost:9090 (Prometheus' conventional port). Use the /targets page to confirm the
      # docketclock API/poller pods are UP and kube-state-metrics/node-exporter are scraping. Grafana
      # (`task grafana`) is the day-to-day view; this is the raw store for target debugging + ad-hoc PromQL.
      - kubectl -n observability port-forward svc/prometheus-server 9090:80

  minio:
    desc: Port-forward the MinIO console to http://localhost:9001 (backup target; creds from Vault via ESO)
    cmds:
      # MinIO (backups namespace) is the in-cluster S3 backup target (backups PR-1). Post-2025-04
      # community images ship a slimmed object-browser console — enough to eyeball backup objects;
      # admin ops go through `mc` (see the bucket-init Job). Login = the minio-root Secret:
      #   kubectl -n backups get secret minio-root -o jsonpath='{.data.root_user}' | base64 -d
      # (and the same with root_password). Port 9001 avoids grafana (3000) / langfuse (3001).
      - kubectl -n backups port-forward svc/minio 9001:9001

  langfuse:
    desc: Port-forward Langfuse to http://localhost:3001 (LLM-obs UI; login admin@docketclock.local)
    cmds:
      # Langfuse listens on :3000; mapped to localhost:3001 to avoid colliding with `task grafana` (3000).
      # NEXTAUTH_URL in the Deployment is set to http://localhost:3001 to match — keep them in sync. Login
      # is admin@docketclock.local + the seeded init_user_password (default docketclock-dev; from Vault via
      # ESO — `task vault-seed` seeds secret/langfuse/config). See the Observability section in the README.
      - kubectl -n langfuse port-forward svc/langfuse 3001:3000
