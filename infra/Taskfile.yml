# DocketClock local platform — the codified runbook (ADR 0009). Run from infra/: `task dev-up`.
# The ONLY imperative seam is installing Argo CD; Argo then reconciles everything else from git/charts.
version: '3'

vars:
  CLUSTER: yokel
  ARGOCD_CHART_VERSION: 9.5.21

tasks:
  dev-up:
    desc: Bring up the full local GitOps stack (colima → k3d → Argo CD → platform → app)
    cmds:
      - task: cluster-up
      - task: bootstrap-argocd
      - task: platform
      - task: vault-transit-init   # enable the transit seal so the main Vault can auto-unseal
      - task: vault-seed           # init + seed the main Vault (must precede wait-platform: an
      - task: wait-platform        #   uninitialized Vault is never Healthy until vault-seed inits it)
      - task: app-local
      - echo "✅ Stack up. 'task status' for state; 'task argocd-ui' for the Argo dashboard."

  cluster-up:
    desc: Start colima if needed, then create the k3d cluster from config
    cmds:
      # --dns: pin public resolvers. On a Tailscale host the lima DNS forwarder (192.168.5.2) is
      # unreliable, which breaks image pulls inside the k3d nodes. If colima is already running
      # without this, `colima restart --dns 1.1.1.1 --dns 8.8.8.8` once.
      - colima status >/dev/null 2>&1 || colima start --cpu 6 --memory 12 --disk 60 --dns 1.1.1.1 --dns 8.8.8.8
      # Create only if absent — checked AFTER colima is up (k3d needs the docker daemon to see the
      # cluster). A no-op task-level `status:` guard would race: it runs before colima starts, so it
      # can't see a cluster living inside a stopped VM and would wrongly try to recreate it.
      - k3d cluster list {{.CLUSTER}} >/dev/null 2>&1 || k3d cluster create --config k3d/yokel.yaml

  bootstrap-argocd:
    desc: Install Argo CD via Helm (the single imperative seam)
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm >/dev/null 2>&1 || true
      - helm repo update argo >/dev/null
      - >
        helm upgrade --install argocd argo/argo-cd
        -n argocd --create-namespace
        --version {{.ARGOCD_CHART_VERSION}}
        -f bootstrap/argocd-values.yaml
        --wait --timeout 6m

  platform:
    desc: Apply the platform Argo Applications (CNPG, ESO, Vault + transit) — Argo syncs them from charts
    cmds:
      - kubectl apply -f argocd/apps/platform-cnpg.yaml -f argocd/apps/platform-eso.yaml -f argocd/apps/platform-vault-transit.yaml -f argocd/apps/platform-vault.yaml

  vault-transit-init:
    desc: Enable the transit seal on the seal-provider Vault so the main Vault can auto-unseal (idempotent)
    cmds:
      - bash scripts/vault-transit-init.sh

  wait-platform:
    desc: Wait for the platform Argo Applications to be Healthy, then their CRDs to be established
    cmds:
      # Argo syncs asynchronously after `platform`; wait on the Applications (which exist immediately)
      # rather than raw pods (which may not exist yet) so a clean `task dev-up` doesn't race ahead.
      # `vault` only goes Healthy after vault-seed inits it — which is why vault-seed runs before this.
      - kubectl wait --for=jsonpath='{.status.health.status}'=Healthy application/cnpg application/external-secrets application/vault-transit application/vault -n argocd --timeout=300s
      - kubectl wait --for=condition=Established crd/clusters.postgresql.cnpg.io --timeout=120s
      - kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=120s

  vault-seed:
    desc: Init the main Vault (transit auto-unseal), seed external secrets, wire ESO token auth (idempotent)
    cmds:
      - bash scripts/vault-seed.sh

  app-local:
    desc: Install the docketclock chart locally (Argo manages it from git once pushed)
    dir: ..
    cmds:
      - >
        helm upgrade --install docketclock charts/docketclock
        -n docketclock --create-namespace
        -f charts/docketclock/values.yaml -f charts/docketclock/values-local.yaml
        --wait --timeout 5m

  dev-down:
    desc: Delete the k3d cluster (colima keeps running)
    cmds:
      - k3d cluster delete {{.CLUSTER}}

  status:
    desc: Argo Applications + key workloads
    cmds:
      - kubectl get applications -n argocd 2>/dev/null || true
      - kubectl get pods -A | grep -E 'argocd|cnpg|external-secrets|vault|docketclock' || true

  argocd-password:
    desc: Print the initial Argo CD admin password
    cmds:
      - 'kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d; echo'

  argocd-ui:
    desc: Port-forward the Argo CD UI to https://localhost:8081 (user admin)
    cmds:
      - kubectl -n argocd port-forward svc/argocd-server 8081:443
