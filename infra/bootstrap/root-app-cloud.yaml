# App-of-apps ROOT (cloud) — STUB. Same mechanism as local, different overlay path.
# Filled at Phase 3 deploy: points at infra/argocd/apps-cloud (HA values, cloud StorageClass/LB/TLS,
# CNPG backups to object storage, Vault HA + KMS auto-unseal). See ADR 0008 / 0009.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lucas-homer/yokel.git
    targetRevision: main
    path: infra/argocd/apps-cloud # TODO(phase-3): create this overlay dir
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
